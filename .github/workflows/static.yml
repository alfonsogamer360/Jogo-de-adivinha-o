name: Deploy Jogo da Palavra Oculta

on:
  push:
    branches: ["main"] # Se sua branch for 'master', troque aqui

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Pages
        uses: actions/configure-pages@v4

      - name: Upload do Jogo
        uses: actions/upload-pages-artifact@v3
        with:
          # Faz o upload de tudo (HTML, CSS e JS) na raiz
          path: '.'

      - name: Deploy Final
        id: deployment
        uses: actions/deploy-pages@v4
